# Default values for invox-service-deploy library chart.
# This is used to deploy ATXINVOX microservices using the library templates.

# Default image configuration (can be overridden per service)
image:
  registry: ghcr.io
  namespace: varkrish
  repository: ghcr.io/varkrish  # fallback if registry/namespace not used
  name: ""  # Service-specific image name (auth-service, file-metadata-service, etc.)
  pullPolicy: IfNotPresent
  tag: ""  # defaults to chart appVersion

# Image pull secrets for GHCR authentication
imagePullSecrets:
  - name: ghcr-secret

# Service account
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Pod annotations and labels
podAnnotations: {}
podLabels: {}

# Security contexts
podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Service configuration
service:
  type: ClusterIP
  port: 80
  ports:
    - name: http
      port: 80
      containerPort: 8000
      targetPort: http
      protocol: TCP

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# Resource limits and requests
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

# Horizontal Pod Autoscaler
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Probes configuration
probes:
  liveness:
    enabled: true
    path: /health
    port: http
    scheme: HTTP
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 3
  readiness:
    enabled: true
    path: /health
    port: http
    scheme: HTTP
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 3

# Environment variables
env: []
  # - name: ENV_VAR_NAME
  #   value: "env_var_value"

# Environment variables from ConfigMaps and Secrets
envFrom:
  configMaps: []
    # - common-config
    # - service-specific-config
  secrets: []
    # - database-secret
    # - api-secret

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Number of replicas (only used if autoscaling is disabled)
replicaCount: 1

# Name override
nameOverride: ""
fullnameOverride: ""